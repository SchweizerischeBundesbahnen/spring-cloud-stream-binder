spring:
  cloud:
    function:
      definition: customQueueConsumer
    stream:
      bindings:
        customQueueConsumer-in-0:
          destination: example/primary/topic
          group: custom-group
      solace:
        bindings:
          customQueueConsumer-in-0:
            consumer:
              queueNameExpression: "'custom-prefix.' + group + '.v1'"
              queueAccessType: EXCLUSIVE
              queueAdditionalSubscriptions: "example/extra/>,example/more"
      poller:
        fixed-delay: 500
