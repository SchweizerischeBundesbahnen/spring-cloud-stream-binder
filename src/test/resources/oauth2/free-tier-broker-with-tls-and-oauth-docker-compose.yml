networks:
  solace_msg_net:
    external: false

services:
  solbroker:
    image: solace/solace-pubsub-standard:10.25.0
    hostname: solbroker
    networks:
      - solace_msg_net
    env_file:
      - ./solace_tls.env
    shm_size: 2g
    ulimits:
      memlock: -1
      nofile:
        soft: 1048576
        hard: 1048576
    build:
      # workaround for https://github.com/docker/compose/issues/11867
      dockerfile_inline: |-
        FROM docker:latest
        COPY ./certs/broker/solbroker.pem /run/secrets/server.pem

  solaceoauth: # A nginx reverse proxy for enabling SSL access to Keycloak
    image: nginx:1.21.6
    hostname: solaceoauth
    networks:
      - solace_msg_net
    build:
      dockerfile_inline: |-
        FROM docker:latest
        COPY ./oauth/nginx.conf /etc/nginx/nginx.conf
        COPY ./oauth/www /data/www
        COPY ./certs/keycloak /etc/sslcerts/

  keycloak:
    image: quay.io/keycloak/keycloak:16.1.1
    hostname: keycloak
    networks:
      - solace_msg_net
    build:
      dockerfile_inline: |-
        FROM docker:latest
        COPY ./oauth/keycloak /tmp/keycloak/
    environment:
      - DB_VENDOR=h2
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=mysecret1!
      - PROXY_ADDRESS_FORWARDING=true  #important for reverse proxy
      - "KEYCLOAK_IMPORT=/tmp/keycloak/solace-oauth-resource-server1-realm-export.json,/tmp/keycloak/solace-oauth-resource-server2-realm-export.json"
    command:
      - "-Dkeycloak.migration.strategy=IGNORE_EXISTING"
